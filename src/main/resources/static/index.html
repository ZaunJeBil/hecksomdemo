<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧健康日誌與風險評估系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
    <div class="max-w-5xl mx-auto px-4 py-8">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">🌲 智慧健康日誌與風險評估系統</h1>
            <p class="text-slate-500 mt-2">計算機概論課程期末專案 - 多層分支決策樹模型</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 h-fit">
                <h2 class="text-xl font-bold mb-4 text-slate-900">📝 今日健康數據填寫</h2>
                <form id="healthForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">紀錄日期</label>
                        <input type="date" id="logDate" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">睡眠時數 (小時)</label>
                        <input type="number" step="0.1" id="sleepHours" placeholder="例如: 7.5" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">當日步數</label>
                        <input type="number" id="steps" placeholder="例如: 8000" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">心情分數 (1 ~ 10)</label>
                        <input type="number" id="moodScore" min="1" max="10" placeholder="10分為極佳" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-indigo-500">
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition duration-200 shadow-sm">
                        送出數據並進行模型分析
                    </button>
                </form>
            </div>

            <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-xl font-bold mb-4 text-slate-900">📊 歷史健康日誌紀錄</h2>
                <div class="overflow-x-auto max-h-[500px] overflow-y-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-100 bg-slate-50 text-slate-500 text-sm font-semibold">
                                <th class="p-3">日期</th>
                                <th class="p-3">睡眠時間</th>
                                <th class="p-3">當日步數</th>
                                <th class="p-3">心情分數</th>
                                <th class="p-3 text-center">決策樹預測結果</th>
                            </tr>
                        </thead>
                        <tbody id="logsTableBody" class="divide-y divide-slate-50">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('logDate').valueAsDate = new Date();

        // 讀取日誌紀錄
        async function loadLogs() {
            try {
                const response = await fetch('/api/health-logs'); // 改為相對路徑，完全相容 Railway 環境
                const logs = await response.json();
                logs.sort((a, b) => b.logDate.localeCompare(a.logDate));

                const tbody = document.getElementById('logsTableBody');
                tbody.innerHTML = '';

                logs.forEach(log => {
                    let badgeHTML = '';
                    if (log.riskLevel === 'HIGH') {
                        badgeHTML = `<span class="bg-red-50 text-red-600 font-semibold px-2.5 py-1 rounded-full text-xs border border-red-200">🔴 高風險 (HIGH)</span>`;
                    } else if (log.riskLevel === 'MEDIUM') {
                        badgeHTML = `<span class="bg-amber-50 text-amber-600 font-semibold px-2.5 py-1 rounded-full text-xs border border-amber-200">🟡 中風險 (MEDIUM)</span>`;
                    } else {
                        badgeHTML = `<span class="bg-emerald-50 text-emerald-600 font-semibold px-2.5 py-1 rounded-full text-xs border border-emerald-200">🟢 低風險 (LOW)</span>`;
                    }

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50/80 transition-colors text-slate-700 text-sm";
                    tr.innerHTML = `
                        <td class="p-3 font-medium">${log.logDate}</td>
                        <td class="p-3">${log.sleepHours} 小時</td>
                        <td class="p-3">${log.steps.toLocaleString()} 步</td>
                        <td class="p-3">${log.moodScore} / 10</td>
                        <td class="p-3 text-center">${badgeHTML}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error("無法載入資料紀錄:", error);
            }
        }

        // 處理表單送出 [cite: 97]
        document.getElementById('healthForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                logDate: document.getElementById('logDate').value,
                sleepHours: parseFloat(document.getElementById('sleepHours').value),
                steps: parseInt(document.getElementById('steps').value),
                moodScore: parseInt(document.getElementById('moodScore').value)
            };

            try {
                const response = await fetch('/api/health-logs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    document.getElementById('sleepHours').value = '';
                    document.getElementById('steps').value = '';
                    document.getElementById('moodScore').value = '';
                    loadLogs(); // 重新讀取 [cite: 97]
                }
            } catch (error) {
                console.error("送出失敗:", error);
            }
        });

        loadLogs();
    </script>
</body>
</html>
